      edit tools:\n- `edit`: single find/replace in one file.\n- `multiedit`: multiple
      find/replace operations in one file.\n- `write`: create or overwrite an entire
      file.\n\nThe edit tools are strictly literal; approximate matches will fail.\n1.
      **Verify Context**: View relevant file sections first to verify exact indentation,
