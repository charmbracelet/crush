,"repository":{"name":"github.com/Balun-courses/deep_go"},"file":{"path":"lessons/contexts/after_done/main.go","url":"/r/github.com/Balun-courses/deep_go/-/blob/lessons/contexts/after_done/main.go","content":"package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\t\"time\"\n)\n\n// context.AfterFunc\n\nfunc WithCtxAfterFunc(ctx context.Context, action func()) {\n\tif action != nil {\n\t\tgo func() {\n\t\t\t\u003c-ctx.Done()\n\t\t\taction()\n\t\t}()\n\t}\n}\n\nfunc main() {\n\tctx, cancel := context.WithCancel(context.Background())\n\tWithCtxAfterFunc(ctx, func() {\n\t\tfmt.Println(\"after\")\n\t})\n\n\tcancel()\n\n\ttime.Sleep(100 * time.Millisecond)\n}\n"},"lineMatches":[{"preview":"func main() {","lineNumber":19,"offsetAndLengths":[[0,9]]},{"preview":"\tWithCtxAfterFunc(ctx, func() {","lineNumber":21,"offsetAndLengths":[[13,4],[23,4]]},{"preview":"package main","lineNumber":0,"offsetAndLengths":[[8,4]]},{"preview":"// context.AfterFunc","lineNumber":8,"offsetAndLengths":[[16,4]]},{"preview":"func WithCtxAfterFunc(ctx context.Context, action func()) {","lineNumber":10,"offsetAndLengths":[[0,4],[17,4],[50,4]]}]}]}}}}'
